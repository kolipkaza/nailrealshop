<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการทำงานช่าง - NailReal Shop</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        /* Technician History Page Specific Styles - Rose Gold Theme */
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8F9FA; color: #2D3436; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        h1 { color: #B76E79; border-bottom: 3px solid #D4AF37; padding-bottom: 10px; margin-bottom: 30px; }
        h2 { color: #B76E79; margin-bottom: 1rem; font-size: 1.5rem; }
        h3 { color: #2D3436; font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid #F5E6E8;
        }
        .stat-card .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #B76E79 0%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card .stat-label {
            color: #636e72;
            font-size: 0.9rem;
        }

        /* History List */
        .history-container {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #F5E6E8;
        }

        .history-item {
            background: #F8F9FA;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid #B76E79;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background: white;
            box-shadow: 0 4px 12px rgba(183, 110, 121, 0.1);
            border-left-color: #D4AF37;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .history-service {
            font-size: 1.25rem;
            font-weight: 700;
            color: #2D3436;
        }

        .history-appointment {
            font-size: 0.9rem;
            color: #636e72;
        }

        .history-details {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #E8D5D5;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .detail-label {
            font-size: 0.85rem;
            color: #636e72;
        }

        .detail-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: #B76E79;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-completed {
            background: rgba(183, 110, 121, 0.1);
            color: #B76E79;
        }

        .status-active {
            background: rgba(255, 152, 0, 0.1);
            color: #FF9800;
        }

        .no-history {
            text-align: center;
            padding: 3rem;
            color: #636e72;
        }

        /* Navigation */
        .nav-container { display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; }
        .nav-menu { list-style: none; display: flex; gap: 2rem; margin: 0; padding: 0; }
        .nav-menu a { color: #2D3436; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-menu a:hover { color: #B76E79; }
        .logo { font-size: 1.75rem; font-weight: 700; color: #B76E79; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .navbar { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border-bottom: 1px solid #E8D5D5; position: sticky; top: 0; z-index: 1000; }

        /* Loading */
        .loading-message {
            text-align: center;
            padding: 3rem;
            color: #B76E79;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <body>
    <div class="main-wrapper">

    <div class="container" style="padding-top:2rem;">
        <h1>📊 ประวัติการทำงานช่าง</h1>

        <!-- Loading State -->
        <div id="loading-message" class="loading-message">กำลังโหลดข้อมูลประวัติการทำงาน...</div>

        <!-- No Technician Selected -->
        <div id="no-technician" style="display: none; text-align: center; padding: 3rem;">
            <h2 style="color: #636e72;">กรุณาเลือกช่างก่อนดูประวัติ</h2>
            <a href="admin_panel.html" class="btn btn-primary" style="margin-top: 1rem;">เข้า Admin Panel</a>
        </div>

        <!-- Technician Stats -->
        <div id="technician-stats" style="display: none;">
            <h2 id="technician-name"></h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="total-count">0</div>
                    <div class="stat-label">รายการทั้งหมด</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completed-count">0</div>
                    <div class="stat-label">เสร็จสิ้น</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="active-count">0</div>
                    <div class="stat-label">กำลังทำอยู่</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total-duration">0h</div>
                    <div class="stat-label">เวลาทำงานรวม</div>
                </div>
            </div>
        </div>

        <!-- History List -->
        <div id="history-container" class="history-container" style="display: none;"></div>
    </div>

    <script src="./sidebar.js"></script>
    <script src="./technician_history.js"></script>
</body>
</html>
