<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การนัดหมาย - NailReal Shop</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .booking-form {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.08);
            border: 1px solid #F0EBE3;
            margin-bottom: 2rem;
        }
        .booking-form h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #3D3D3D;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid #F0EBE3;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #5A5A5A;
            margin-bottom: 0.4rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #E8DFD5;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #3D3D3D;
            background: white;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #C9A86C;
            box-shadow: 0 0 0 3px rgba(201, 168, 108, 0.15);
        }
        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .filter-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid #E8DFD5;
            background: white;
            color: #5A5A5A;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover { border-color: #C9A86C; color: #8B7355; }
        .filter-btn.active { background: #8B7355; color: white; border-color: #8B7355; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }
        .status-pending { background: #FFF3CD; color: #856404; }
        .status-confirmed { background: #CCE5FF; color: #004085; }
        .status-in-progress { background: #FFE8CC; color: #E65100; }
        .status-completed { background: #D4EDDA; color: #155724; }
        .status-cancelled { background: #F8D7DA; color: #721C24; }
    </style>
</head>
<body>
    <body>
    <div class="main-wrapper">

    <main class="container">
        <h2 class="section-title">📅 การนัดหมาย</h2>

        <!-- Booking Form -->
        <div class="booking-form" id="booking-form">
            <h3>➕ จองคิวใหม่</h3>
            <form id="new-appointment-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>👤 ชื่อลูกค้า *</label>
                        <input type="text" id="cust-name" required placeholder="ชื่อ-นามสกุล">
                    </div>
                    <div class="form-group">
                        <label>📱 เบอร์โทร</label>
                        <input type="tel" id="cust-phone" placeholder="0XX-XXX-XXXX">
                    </div>
                    <div class="form-group">
                        <label>💅 บริการ *</label>
                        <select id="service-select" required>
                            <option value="">-- เลือกบริการ --</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>📆 วันที่ *</label>
                        <input type="date" id="appt-date" required>
                    </div>
                    <div class="form-group">
                        <label>🕐 เวลา</label>
                        <input type="time" id="appt-time">
                    </div>
                    <div class="form-group">
                        <label>📝 หมายเหตุ</label>
                        <textarea id="appt-notes" rows="1" placeholder="หมายเหตุเพิ่มเติม..."></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">✅ จองคิว</button>
                    <button type="reset" class="btn btn-secondary">🔄 ล้าง</button>
                </div>
            </form>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">ทั้งหมด</button>
            <button class="filter-btn" data-filter="pending">⏳ รอยืนยัน</button>
            <button class="filter-btn" data-filter="confirmed">✅ ยืนยันแล้ว</button>
            <button class="filter-btn" data-filter="in-progress">🔄 กำลังทำ</button>
            <button class="filter-btn" data-filter="completed">💯 เสร็จแล้ว</button>
            <button class="filter-btn" data-filter="cancelled">❌ ยกเลิก</button>
        </div>

        <!-- Appointments List -->
        <div id="appointments-list" class="appointments-grid">
            <p style="color: #7A7A7A;">กำลังโหลด...</p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 NailReal Shop</p>
    </footer>

    <script src="./sidebar.js"></script>
    <script src="./appointments.js"></script>
</body>
</html>
