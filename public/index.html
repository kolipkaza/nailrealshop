<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NailReal Shop - ระบบจัดการร้านทำเล็บ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">💅 NailReal</a>
            <ul class="nav-menu">
                <li><a href="#dashboard">📊 Dashboard</a></li>
                <li><a href="#appointments">📅 การนัดหมาย</a></li>
                <li><a href="#customers">👥 ลูกค้า</a></li>
                <li><a href="#services">💅 บริการ</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <h1 class="hero-title">NailReal Shop</h1>
        <p class="hero-subtitle">ระบบจัดการภายในร้านทำเล็บ</p>
    </header>

    <!-- Dashboard Section -->
    <main class="container">
        <section id="dashboard">
            <h2 class="section-title">📊 Dashboard</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>📅 การนัดหมายวันนี้</h3>
                    <p class="stat-number" id="today-appointments">0</p>
                </div>
                <div class="stat-card">
                    <h3>👥 ลูกค้าทั้งหมด</h3>
                    <p class="stat-number" id="total-customers">0</p>
                </div>
                <div class="stat-card">
                    <h3>💅 บริการ</h3>
                    <p class="stat-number" id="total-services">0</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 NailReal Shop - ระบบจัดการร้านทำเล็บ</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
