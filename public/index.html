<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NailReal Shop - ระบบจัดการร้านทำเล็บ</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- Main Content -->
    <div class="main-wrapper" id="mainWrapper">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="topbar-title">Dashboard</h1>
                <span class="topbar-date" id="topbarDate"></span>
            </div>
            <div class="topbar-right">
                <span class="topbar-time" id="topbarTime"></span>
            </div>
        </header>

        <!-- Dashboard Content -->
        <main class="dashboard-content">
            <!-- Summary Cards Row -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-info">
                        <p class="stat-label">นัดหมายวันนี้</p>
                        <p class="stat-number" id="today-appointments">-</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-info">
                        <p class="stat-label">กำลังให้บริการ</p>
                        <p class="stat-number" id="in-progress">-</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-info">
                        <p class="stat-label">ลูกค้าทั้งหมด</p>
                        <p class="stat-number" id="total-customers">-</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💅</div>
                    <div class="stat-info">
                        <p class="stat-label">บริการทั้งหมด</p>
                        <p class="stat-number" id="total-services">-</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🧑‍💼</div>
                    <div class="stat-info">
                        <p class="stat-label">ช่างทั้งหมด</p>
                        <p class="stat-number" id="total-technicians">-</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-info">
                        <p class="stat-label">รายรับวันนี้</p>
                        <p class="stat-number" id="today-revenue">-</p>
                    </div>
                </div>
            </div>

            <!-- Two Column Layout -->
            <div class="dashboard-grid">
                <!-- Recent Appointments -->
                <section class="dashboard-section">
                    <h2 class="section-title-sm">📅 นัดหมายล่าสุด</h2>
                    <div id="recent-appointments" class="mini-list">
                        <p class="empty-msg">กำลังโหลด...</p>
                    </div>
                </section>

                <!-- Recent Service Logs -->
                <section class="dashboard-section">
                    <h2 class="section-title-sm">📋 ประวัติล่าสุด</h2>
                    <div id="recent-logs" class="mini-list">
                        <p class="empty-msg">กำลังโหลด...</p>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="./sidebar.js"></script>
    <script src="./app.js"></script>
</body>
</html>
