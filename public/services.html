<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บริการทั้งหมด - NailReal Shop</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        /* Services Page Specific Styles - Rose Gold Theme */
        .services-page { padding: 2rem 0; }
        .services-section { margin-bottom: 3rem; }
        .services-category { margin-bottom: 2rem; }
        .category-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #B76E79;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .service-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border: 1px solid #F5E6E8;
            cursor: pointer;
        }
        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(183, 110, 121, 0.15);
            border-color: #E8D5D5;
        }
        .service-image-container {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #F8F9FA 0%, #F5E6E8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .service-image { width: 100%; height: 100%; object-fit: cover; }
        .service-image-placeholder {
            text-align: center;
            color: #636e72;
        }
        .service-image-placeholder .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .service-image-placeholder .slot-id {
            font-size: 0.75rem;
            background: rgba(183, 110, 121, 0.1);
            color: #B76E79;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-family: monospace;
        }
        .service-card-content { padding: 1.5rem; }
        .service-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .service-name { font-size: 1.2rem; font-weight: 700; color: #2D3436; margin: 0 0 0.5rem 0; }
        .service-description {
            font-size: 0.95rem;
            color: #636e72;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .service-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: #B76E79;
        }
        .service-duration {
            font-size: 0.85rem;
            color: #636e72;
        }
        .loading-message {
            text-align: center;
            padding: 3rem;
            color: #B76E79;
            font-size: 1.1rem;
        }
        .error-message {
            text-align: center;
            padding: 3rem;
            color: #d63031;
            font-size: 1.1rem;
        }
        .services-page h2 { color: #2D3436; border-left: 4px solid #B76E79; padding-left: 12px; margin-bottom: 2rem; }
        .services-page h3 { color: #2D3436; margin-bottom: 1rem; }
        .services-page p { color: #636e72; }
        .services-page .services-grid { margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="main-wrapper">
    <div class="services-page container" style="padding-top:2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <div>
                <h2 style="margin-bottom: 0.3rem;">💅 บริการทั้งหมด</h2>
                <p>คลิกที่รายการเพื่อดูรายละเอียด หรือกดปุ่มด้านล่างเพื่อเพิ่มบริการใหม่</p>
            </div>
            <button onclick="openAddModal()" style="padding: 10px 24px; background: #8B7355; color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; font-weight: 600;">
                ➕ เพิ่มบริการ
            </button>
        </div>

        <!-- Loading State -->
        <div id="loading-message" class="loading-message">กำลังโหลดข้อมูลบริการ...</div>

        <!-- Error State -->
        <div id="error-message" class="error-message" style="display: none;">
            ❌ ไม่สามารถโหลดข้อมูลบริการได้
            <p id="error-details" style="font-size: 0.9rem; margin-top: 10px;"></p>
        </div>

        <!-- Services Grid -->
        <div id="services-grid" class="services-grid" style="display: none;"></div>
    </div>

    <!-- Add Service Modal -->
    <div id="addModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:white; border-radius:16px; padding:2rem; width:90%; max-width:480px; box-shadow:0 20px 60px rgba(0,0,0,0.2);">
            <h3 style="margin-bottom:1.5rem; font-size:1.3rem;">➕ เพิ่มบริการใหม่</h3>
            <div class="form-group">
                <label class="form-label">ชื่อบริการ *</label>
                <input class="form-input" id="add-name" placeholder="เช่น แมนิคิวเจล" />
            </div>
            <div class="form-group">
                <label class="form-label">รายละเอียด</label>
                <textarea class="form-input" id="add-desc" rows="3" placeholder="คำอธิบายบริการ"></textarea>
            </div>
            <div style="display:flex; gap:1rem;">
                <div class="form-group" style="flex:1;">
                    <label class="form-label">ราคา (฿) *</label>
                    <input class="form-input" id="add-price" type="number" placeholder="500" />
                </div>
                <div class="form-group" style="flex:1;">
                    <label class="form-label">ระยะเวลา (นาที) *</label>
                    <input class="form-input" id="add-duration" type="number" placeholder="60" />
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">หมวดหมู่</label>
                <select class="form-select" id="add-category">
                    <option value="basic">Basic - พื้นฐาน</option>
                    <option value="gel">Gel - เจล</option>
                    <option value="extensions">Extensions - ต่อเล็บ</option>
                    <option value="art">Art - ลายเล็บ</option>
                    <option value="spa">Spa - สปา</option>
                    <option value="lashes">Lashes - ขนตา</option>
                    <option value="repair">Repair - ซ่อมเล็บ</option>
                    <option value="package">Package - แพ็คเกจ</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">ไอคอน</label>
                <input class="form-input" id="add-icon" placeholder="💅" maxlength="4" />
            </div>
            <div id="add-error" style="color:#d63031; font-size:0.85rem; margin-bottom:0.8rem; display:none;"></div>
            <div style="display:flex; gap:0.8rem; justify-content:flex-end; margin-top:0.5rem;">
                <button onclick="closeAddModal()" style="padding:10px 20px; border:1px solid #E8DFD5; background:white; border-radius:8px; cursor:pointer; font-size:0.9rem;">ยกเลิก</button>
                <button onclick="submitAddService()" style="padding:10px 24px; background:#8B7355; color:white; border:none; border-radius:8px; cursor:pointer; font-size:0.9rem; font-weight:600;">✅ เพิ่มบริการ</button>
            </div>
        </div>
    </div>

    <script src="./sidebar.js"></script>
    <script src="./services.js?v=3"></script>
</body>
</html>
